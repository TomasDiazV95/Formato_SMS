<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Reportes</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="{{ url_for('static', filename='style.css') }}" rel="stylesheet">
</head>
<body class="bg-soft">
  <a href="{{ url_for('sms.main') }}" class="btn btn-primary btn-sm position-fixed top-0 end-0 m-3 shadow">
    🏠 Inicio
  </a>

  <div class="container py-5">
    <div class="mx-auto" style="max-width: 700px;">
      <div class="card shadow-sm border-0 rounded-4 overflow-hidden mb-4">
        <div class="p-4 p-md-5 header-grad text-black">
          <h1 class="h4 mb-1">Reportes de Costos</h1>
          <p class="mb-0 opacity-75">Descarga consolidado general o por mandante.</p>
        </div>
        <div class="p-4 p-md-5 bg-white">
          <div class="mb-4">
            <h2 class="h6">Reporte consolidado</h2>
            <p class="text-muted small mb-2">Descarga el resumen global de costos por proceso.</p>
            <a class="btn btn-outline-primary" href="{{ url_for('reports.download_costos_totales') }}">Descargar Costos Totales</a>
          </div>

          <hr>

          <div>
            <h2 class="h6">Reporte por mandante</h2>
            <p class="text-muted small">Selecciona un mandante para generar el informe filtrado.</p>
            <form class="row g-3" method="GET" action="{{ url_for('reports.download_costos_mandante') }}">
              <div class="col-12">
                <select class="form-select" name="mandante" required>
                  <option value="" selected>Selecciona un mandante</option>
                  {% for mandante in mandantes %}
                    <option value="{{ mandante }}">{{ mandante }}</option>
                  {% endfor %}
                </select>
              </div>
              <div class="col-12">
                <button class="btn btn-primary" type="submit">Descargar reporte por mandante</button>
              </div>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
